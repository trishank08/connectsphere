version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: connectsphere-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: connectsphere
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: connectsphere
      MYSQL_PASSWORD: connectsphere
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: connectsphere-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: connectsphere
      DB_USERNAME: root
      DB_PASSWORD: root
      JWT_SECRET: c29tZS12ZXJ5LWxvbmctc2VjcmV0LWtleS1mb3ItY29ubmVjdHNwaGVyZS1qd3QtdG9rZW4tZ2VuZXJhdGlvbi1hbmQtdmFsaWRhdGlvbg==
      CORS_ORIGINS: http://localhost:5173,http://localhost:80,http://localhost
      UPLOAD_DIR: /app/uploads
    ports:
      - "8080:8080"
    volumes:
      - uploads-data:/app/uploads

  frontend:
    build: ./frontend
    container_name: connectsphere-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql-data:
  uploads-data:
